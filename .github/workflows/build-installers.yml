name: Build Windows and macOS installers

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 installers
            platform: windows-latest
            args: --bundles nsis,msi
          - name: macOS universal installer
            platform: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Normalize npm registry URLs
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const path = "package-lock.json";
          const privateRegistry = "https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/";
          const publicRegistry = "https://registry.npmjs.org/";
          let content = fs.readFileSync(path, "utf8");
          const before = content.split(privateRegistry).length - 1;
          content = content.split(privateRegistry).join(publicRegistry);
          fs.writeFileSync(path, content);
          console.log(`Normalized ${before} private npm registry URL(s).`);
          NODE

      - name: Configure public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Verify package lock registry
        shell: bash
        run: |
          if grep -q "applied-caas-gateway1.internal.api.openai.org" package-lock.json; then
            echo "Private npm registry URL still exists in package-lock.json"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate frontend
        run: npm run build

      - name: Generate Cargo lock file
        run: cargo generate-lockfile --manifest-path src-tauri/Cargo.toml

      - name: Validate Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build native installers
        run: npx tauri build ${{ matrix.args }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found."
            exit 1
          fi
          APP_NAME="$(basename "$APP_PATH" .app)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/${APP_NAME}-universal.app.zip"

      - name: Upload Windows installers
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS installers
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-installer
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*-universal.app.zip
          if-no-files-found: error
          retention-days: 30
